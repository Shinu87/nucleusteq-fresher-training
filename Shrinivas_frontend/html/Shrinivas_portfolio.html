<!doctype html>
<html lang="en">
  <head>
    <!-- meta charset is used to tell the browser what character encoding the page is using -->
    <meta charset="UTF-8" />
    <!-- viewport meta tag is used so that the page adjusts properly on different screen sizes like mobile and laptop -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- title tag shows the name of the page in the browser tab -->
    <title>Shrinivas - Portfolio</title>
  </head>
  <body>
    <header>
      <!-- I used the header tag because this section contains the main introduction of my portfolio -->
      <!-- h1 is used for my full name since it should be the heading of the page -->
      <h1>More Shrinivas Balaji</h1>
      <!-- h2 is used to show my professional title below my name -->
      <h2>Computer Science and Engineering Student</h2>
      <!-- Figure tag wraps the image and its caption -->
      <figure>
        <!-- Img tag is used to show the profile picture on the portfolio -->
        <!-- alt text is used so if the image is not available, this text will be shown -->
        <img src="PROFILE.jpg" alt="Profile Picture" width="150" height="150" />
        <figcaption>Profile Photo</figcaption>
      </figure>
    </header>
    <!-- nav tag is used to contain the navigation links of the page -->
    <nav>
      <!-- I used an unordered list to organize the navigation links as menu items -->
      <ul>
        <!-- each list item contains a link that navigates to a section of the same page -->
        <li><a href="#about">About</a></li>
        <li>
          Skills
          <!-- nested list is used to show categories inside the skills section -->
          <ul>
            <li><a href="#technical-skills">Technical Skills</a></li>
            <li><a href="#soft-skills">Soft Skills</a></li>
          </ul>
        </li>
        <li><a href="#education">Education</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </body>
</html>
