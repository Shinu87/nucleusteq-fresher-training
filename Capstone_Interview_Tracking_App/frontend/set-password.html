<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set Password – Interview Tracker</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-card">
        <h2>🔐 Set Your Password</h2>
        <p class="subtitle">Create your password to activate the account</p>
        <form id="setPasswordForm">
          <label for="password">New Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              placeholder="At least 6 characters"
              required
            />
            <span class="password-toggle" data-target="password">👁</span>
          </div>

          <label for="confirmPassword">Confirm Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="confirmPassword"
              placeholder="Re-enter password"
              required
            />
            <span class="password-toggle" data-target="confirmPassword"
              >👁</span
            >
          </div>

          <button type="submit" class="btn-primary">Set Password</button>
        </form>

        <!-- response message -->
        <div id="message"></div>

        <p class="link-text">
          Already set? <a href="login.html">Go to Login</a>
        </p>
      </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
