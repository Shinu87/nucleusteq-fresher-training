spring.application.name=interviewtracker

spring.datasource.url=jdbc:postgresql://localhost:5432/interview_tracking_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ─── Resume Internal Storage ─────────────────────────────────
# Files are stored at: <project-root>/uploads/resumes/
resume.upload.dir=uploads/resumes
# Max upload size (PDF only)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── SMTP Email Configuration ────────────────────────────────
# Set MAIL_USERNAME and MAIL_PASSWORD in your .env file
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ─── Frontend Base URL (for activation links in emails) ──────
# This is the base URL of the LiveServer frontend; emailed links use this
# prefix when building the password setup URL: <prefix>/set-password.html?token=...
app.frontend.url=http://127.0.0.1:5501/Capstone_Interview_Tracking_App/frontend
# app.frontend.url=http://127.0.0.1:5501
